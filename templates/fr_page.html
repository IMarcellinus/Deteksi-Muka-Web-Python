<!DOCTYPE html>
<html lang="en">
<head>
    {% include "head.html" %}
</head>
<style>
* {
  box-sizing: border-box;
}

#myInput {
  background-image: url('/css/searchicon.png');
  background-position: 10px 10px;
  background-repeat: no-repeat;
  width: 100%;
  font-size: 16px;
  padding: 12px 20px 12px 40px;
  border: 1px solid #ddd;
  margin-bottom: 12px;
}

#myTable {
  border-collapse: collapse;
  width: 100%;
  border: 1px solid #ddd;
  font-size: 18px;
}

#myTable th, #myTable td {
  text-align: left;
  padding: 12px;
}

#myTable tr {
  border-bottom: 1px solid #ddd;
}

#myTable tr.header, #myTable tr:hover {
  background-color: #f1f1f1;
}

#detectionPopup {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  min-width: 260px;
  padding: 16px 20px;
  border-radius: 12px;
  background: #198754;
  color: #fff;
  box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
  display: none;
}

#detectionPopup.popup-unknown {
  background: #dc3545;
}

#detectionPopup strong {
  display: block;
  font-size: 18px;
  margin-bottom: 4px;
}

#popupCategory,
#popupCount {
  display: block;
  margin-top: 4px;
}

#popupBallots {
  margin: 10px 0 0;
  padding-left: 18px;
}

#popupBallots li {
  margin-bottom: 4px;
}

.page-content {
  margin-top: 3rem;
  margin-bottom: 3rem;
}

.scan-panel {
  height: 500px;
  overflow-y: auto;
}

@media (max-width: 991.98px) {
  .page-content {
    margin-top: 2rem;
  }

  .scan-panel {
    height: auto;
    margin-top: 1.5rem;
  }
}
</style>
<body >

{% include "navbar.html" %}

<div id="detectionPopup">
    <strong id="popupName">Wajah terdeteksi</strong>
    <span id="popupMessage">Nama berhasil dikenali.</span>
    <span id="popupCategory"></span>
    <span id="popupCount"></span>
    <ul id="popupBallots"></ul>
</div>

<div class="container-fluid">
    <div class="row page-content">
        <div class="col-12 col-lg-8 offset-lg-2">
            <div class="row">
        <div class="col-12 col-md-8">
            <img src="{{ url_for('video_feed') }}" width="100%" class="img-thumbnail">
        </div>
        <div class="col-12 col-md-4 scan-panel">
            <h3>Daftar Pemilih</h3>
           <input type="text" id="myInput" onkeyup="myFunction()" placeholder="Search for names.." title="Type in a name">

<table id="myTable">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>NIK</th>
                        <th>Status</th>
                        <th>Added</th>
                    </tr>
                </thead>
                <tbody id="scandata">

                </tbody>
            </table>
        </div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
    $(document).ready(function() {
        let lastcnt = 0;
        let lastPopupTimestamp = 0;
        let popupTimeout = null;
        chkNewScan();
        chkLastDetected();

        function chkNewScan() {
            countTodayScan();
            setTimeout(chkNewScan, 1000);
        }

        function chkLastDetected() {
            $.ajax({
                url: '/last_detected',
                type: 'GET',
                dataType: 'json',
                success: function(data) {
                    if (data.name && data.timestamp && data.timestamp > lastPopupTimestamp) {
                        lastPopupTimestamp = data.timestamp;
                        showDetectionPopup(data);
                    }
                },
                error: function(result){
                    console.log('popup not available')
                }
            });

            setTimeout(chkLastDetected, 1000);
        }

        function showDetectionPopup(data) {
            const ballotList = $("#popupBallots");
            const popup = $("#detectionPopup");

            $("#popupName").text(data.name);
            $("#popupMessage").text(data.message || "");

            ballotList.empty();
            if (data.status === "unknown") {
                popup.addClass("popup-unknown");
                $("#popupCategory").text("");
                $("#popupCount").text("");
            } else {
                popup.removeClass("popup-unknown");
                $("#popupCategory").text(data.category || "");
                $("#popupCount").text("Jumlah surat suara: " + (data.ballot_count || 0));

                $.each(data.ballot_labels || [], function(index, label) {
                    ballotList.append("<li>" + label + "</li>");
                });
            }

            popup.stop(true, true).fadeIn(200);

            if (popupTimeout) {
                clearTimeout(popupTimeout);
            }

            popupTimeout = setTimeout(function() {
                popup.fadeOut(300);
            }, 3000);
        }

        function countTodayScan() {
            $.ajax({
                url: '/countTodayScan',
                type: 'GET',
                dataType: 'json',
                success: function(data) {
                    if (data.rowcount !== lastcnt) {
                        lastcnt = data.rowcount;
                        reloadTable();
                    }
                },
                error: function(result){
                    console.log('no result!')
                }
            })
        }

        function reloadTable() {
            $.ajax({
                url: '/loadData',
                type: 'GET',
                dataType: 'json',
                success: function(response){
                    var tr = $("#scandata");
                    tr.empty();
                    lastcnt = response.rowcount || 0;

                    if (!response.data || response.data.length === 0) {
                        tr.append('<tr><td colspan="4" class="text-center">Belum ada data scan.</td></tr>');
                        return;
                    }

                    $.each(response.data, function(index, item) {
                        tr.append('<tr>'+
                                    '<td>'+item[0]+'</td>'+
                                    '<td>'+item[2]+'</td>'+
                                    '<td>'+item[3]+'</td>'+
                                    '<td>'+item[4]+'</td>'+
                                  '</tr>');
                    });
                },
                error: function(result){
                    console.log('no result!')
                }
            });
        }
    });
</script>

</body>
<script>
function myFunction() {
  var input, filter, table, tr, td, i, txtValue;
  input = document.getElementById("myInput");
  filter = input.value.toUpperCase();
  table = document.getElementById("myTable");
  tr = table.getElementsByTagName("tr");
  for (i = 0; i < tr.length; i++) {
    td = tr[i].getElementsByTagName("td")[1];
    if (td) {
      txtValue = td.textContent || td.innerText;
      if (txtValue.toUpperCase().indexOf(filter) > -1) {
        tr[i].style.display = "";
      } else {
        tr[i].style.display = "none";
      }
    }
  }
}
</script>
</html>
